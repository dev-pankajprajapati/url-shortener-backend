spring:
  application:
    name: url-shortener

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
#    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update


    show-sql: true

    properties:
      hibernate:
        format_sql: true

        dialect: ${DATABASE_DIALECT}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

frontend:
  url: ${FRONTEND_URL}

app:
  base-url: ${APP_BASE_URL}